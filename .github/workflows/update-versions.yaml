name: Update versions

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        run: |
          GLIBC=$(curl -s https://ftp.gnu.org/gnu/glibc/ \
            | grep -oP 'glibc-\K[0-9]+\.[0-9]+(?=\.tar\.xz)' \
            | sort -V | tail -1)

          TZDB=$(curl -s https://data.iana.org/time-zones/tzdb/version)

          yq -i ".glibc = \"$GLIBC\"" versions.yaml
          yq -i ".tzdb = \"$TZDB\"" versions.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update glibc and tzdb
          commit-message: Update glibc and tzdb